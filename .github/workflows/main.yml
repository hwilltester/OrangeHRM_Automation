name: Robot Framework Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install dependencies
        run: pip install robotframework robotframework-seleniumlibrary webdriver-manager

      - name: Run Robot Framework tests
        run: |
          robot --variable BROWSER:headlesschrome \
          --variable IMPLICIT_WAIT:20s \
          --variable PAGE_LOAD_TIMEOUT:45s \
          --outputdir results \
          Tests/
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-test-results
          path: results/
